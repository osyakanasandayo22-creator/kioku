<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14110e" />
    <title>点灯Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./description-bulb.css" />
  </head>
  <body>
    <main class="container">
      <p class="siteLogoRow">
        <img
          class="siteLogoImg siteLogoImg--light"
          src="./images/ロゴ白.png"
          alt="点灯Wiki"
          decoding="async"
        />
        <img
          class="siteLogoImg siteLogoImg--dark"
          src="./images/ロゴ黒.png"
          alt="点灯Wiki"
          decoding="async"
        />
      </p>
      <div class="gameRootWrap">
        <div id="gameRoot"></div>
      </div>
    </main>
    <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://assets.codepen.io/16327/MorphSVGPlugin3.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.5/dist/Draggable.min.js"></script>
    <script src="./description-bulb.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

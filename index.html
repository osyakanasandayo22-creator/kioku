<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#14110e" />
    <title>点灯Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <!-- タブ用: SVG の rel=icon は Chrome 等で PNG より優先されるため head では使わない（manifest に残す） -->
    <link rel="icon" type="image/png" sizes="48x48" href="./images/favicon-48.png?v=1" />
    <link rel="icon" type="image/png" sizes="192x192" href="./images/icon-192.png?v=1" />
    <link rel="icon" type="image/png" sizes="512x512" href="./images/icon-512.png?v=1" />
    <link rel="apple-touch-icon" href="./images/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./description-bulb.css" />
  </head>
  <body>
    <main class="container">
      <p class="siteLogoRow">
        <img
          class="siteLogoImg siteLogoImg--light"
          src="./images/ロゴ白.png"
          alt="点灯Wiki"
          decoding="async"
        />
        <img
          class="siteLogoImg siteLogoImg--dark"
          src="./images/ロゴ黒.png"
          alt="点灯Wiki"
          decoding="async"
        />
      </p>
      <div class="gameRootWrap">
        <div id="gameRoot"></div>
      </div>
    </main>
    <footer class="siteLegalFooter" aria-label="法的表示">
      <div class="siteLegalFooter__row">
        <span class="siteLegalTag" data-legal="terms" role="button" tabindex="0">利用規約ページ</span>
        <span class="siteLegalSep" aria-hidden="true">・</span>
        <span class="siteLegalTag" data-legal="privacy" role="button" tabindex="0">プライバシーポリシー</span>
        <span class="siteLegalSep" aria-hidden="true">・</span>
        <span class="siteLegalTag" data-legal="contact" role="button" tabindex="0">お問い合わせページ</span>
        <span class="siteLegalSep" aria-hidden="true">・</span>
        <span class="siteLegalTag" data-legal="operator" role="button" tabindex="0">運営者情報</span>
        <span class="siteLegalSep" aria-hidden="true">・</span>
        <span class="siteLegalFooter__copy">© obake</span>
      </div>
    </footer>
    <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://assets.codepen.io/16327/MorphSVGPlugin3.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.5/dist/Draggable.min.js"></script>
    <script src="./description-bulb.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
